name: QA Evidence Check

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      days_to_check:
        description: 'Only check issues updated in last N days (0 = all)'
        required: false
        default: '30'
      status_values:
        description: 'Comma-separated status values to check'
        required: false
        default: 'QA Failed,QA Passed/Done'
      dry_run:
        description: 'Dry run mode — report only, no comments or moves'
        required: false
        default: 'false'

jobs:
  check-qa-evidence:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: .github/scripts/requirements_qa_check.txt

      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements_qa_check.txt

      - name: Run QA evidence check
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
          OPEN_AI_KEY_FOR_QA_REVIEW: ${{ secrets.OPEN_AI_KEY_FOR_QA_REVIEW }}
          ORG: Focus-Bear
          PROJECT_NUMBER: '3'
          DAYS_TO_CHECK: ${{ inputs.days_to_check || '30' }}
          STATUS_VALUES: ${{ inputs.status_values || 'QA Failed,QA Passed/Done' }}
          # Update to gpt-5-mini once confirmed at platform.openai.com/docs/models
          OPENAI_MODEL: gpt-5-mini
          REASONING_EFFORT: medium
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python .github/scripts/check_qa_evidence.py
