name: Lint, test & build Code Base
on: [push]

jobs:
  build:
    name: Lint & Build Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install packages
        run: yarn install

      - name: Lint Code Base
        run: yarn lint

      - name: Unit tests
        run: yarn test:ci

      # - name: Android build
      #   run: yarn android:buildProd

