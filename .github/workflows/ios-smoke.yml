name: iOS Smoke Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ios-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run test:smoke
