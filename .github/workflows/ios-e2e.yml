name: iOS E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Manual full-suite trigger
  workflow_dispatch:

jobs:
  smoke-check:
    name: Smoke E2E Check
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify smoke test files exist
        run: |
          test -f ./test/specs/auth/login.e2e.js
          test -f ./test/specs/dashboard/dashboard.stable.e2e.js
          test -f ./test/specs/dashboard/habits/dashboard.start-activity.e2e.js

      - name: List smoke tests
        run: |
          echo "Smoke tests:"
          echo "1. Login success"
          echo "2. Dashboard smoke"
          echo "3. Morning routine activity"

  full-suite-check:
    name: Full E2E Suite Check
    runs-on: macos-latest

    # Full suite runs only when manually triggered
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify full test suite files exist
        run: |
          test -f ./test/specs/auth/login.e2e.js
          test -f ./test/specs/auth/login.invalid.e2e.js
          test -f ./test/specs/auth/login.empty.e2e.js
          test -f ./test/specs/auth/forgot.password.e2e.js
          test -f ./test/specs/auth/password.toggle.e2e.js
          test -f ./test/specs/auth/signup.validation.e2e.js
          test -f ./test/specs/dashboard/dashboard.stable.e2e.js
          test -f ./test/specs/dashboard/habits/dashboard.start-activity.e2e.js
          test -f ./test/specs/dashboard/focus/focus.session.e2e.js

      - name: List full suite tests
        run: |
          echo "Full E2E suite:"
          echo "1. Login success"
          echo "2. Invalid login"
          echo "3. Empty login"
          echo "4. Forgot password"
          echo "5. Password visibility toggle"
          echo "6. Signup validation"
          echo "7. Dashboard smoke"
          echo "8. Morning routine activity"
          echo "9. Focus session"