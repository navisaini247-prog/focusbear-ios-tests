name: iOS E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ios-e2e:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install xcuitest

      - name: Verify Appium
        run: appium -v

      - name: Run stable E2E tests
        run: |
          npx wdio run ./wdio.conf.js --spec ./test/specs/auth/login.e2e.js
