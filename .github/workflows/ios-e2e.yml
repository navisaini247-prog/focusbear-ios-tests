name: iOS E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-check:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Verify stable test files exist
        run: |
          test -f ./test/specs/auth/login.e2e.js
          test -f ./test/specs/auth/login.invalid.e2e.js
          test -f ./test/specs/dashboard/dashboard.stable.e2e.js
          test -f ./test/specs/dashboard/habits/dashboard.start-activity.e2e.js

      - name: List stable E2E tests
        run: |
          echo "Stable E2E tests prepared:"
          echo "1. Login success test"
          echo "2. Invalid login validation test"
          echo "3. Dashboard smoke test"
          echo "4. Morning routine activity test"